<!doctypehtml><html lang=en><head><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>CHIP-8 Pong</title><style>body{background-color:#000;color:#fff;font-family:monospace;margin:0}.screen{margin:auto;width:642px;padding:20px 0}.screen img{display:block;margin:0 auto 12px}canvas{display:block;border:1px solid #333}.controls{display:flex;justify-content:space-between;margin-top:12px;font-size:13px;color:#aaa}.controls table{border-collapse:collapse}.controls td{padding:2px 8px 2px 0}kbd{display:inline-block;padding:1px 6px;border:1px solid #555;border-radius:3px;background:#1a1a1a;color:#ddd;font-family:monospace;font-size:12px}footer{margin:auto;width:642px;padding:12px 0 20px;border-top:1px solid #222;display:flex;justify-content:space-between;font-size:12px;color:#555}footer a{color:#777;text-decoration:none}footer a:hover{color:#aaa}.mybutton{display:none}</style></head><body><div class=screen><img alt=Pong src=pong.png><canvas height=320 id=canvas width=640>Your browser does not support &lt;canvas>.</canvas><div class=controls><table><tr><td>Player 1</td><td><kbd>1</kbd> up   <kbd>4</kbd> down</td></tr></table><table><tr><td>Player 2</td><td><kbd>D</kbd> up   <kbd>C</kbd> down</td></tr></table></div></div><footer><span>Made by <a href=mailto:julien.regnault@gmail.com>Julien Regnault</a></span> <a href=https://github.com/Philipid3s/chip8-wasm target=_blank>Source on GitHub</a></footer><button class=mybutton>Run test function</button><p id=result></p><script>var Module={canvas:document.getElementById("canvas")};document.querySelector(".mybutton").addEventListener("click",(function(){var e=Module.ccall("test_function",null,null,null);document.getElementById("result").innerText=e}))</script><script async src=index.js></script></body></html>
